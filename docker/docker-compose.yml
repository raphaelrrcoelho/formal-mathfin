services:
  verify:
    # Pull-first, build-as-fallback. `docker compose run` checks the local
    # image cache first; if missing, pulls from GHCR (much faster than a
    # local Lean + Mathlib build); if pull fails, falls back to the Dockerfile.
    # The :latest tag tracks the most recent push; pin to a dated tag (e.g.
    # mathfin-verify:2026-05-09) for reproducible CI/old-machine runs.
    #
    # Refresh: `docker compose -f docker/docker-compose.yml pull verify`
    # Force rebuild: `docker compose -f docker/docker-compose.yml build verify`
    # Re-publish (after a successful local rebuild + smoke tests):
    #   TOKEN=$(grep -E '^[[:space:]]+oauth_token:' ~/.config/gh/hosts.yml | head -1 | awk '{print $2}')
    #   echo "$TOKEN" | docker login ghcr.io -u raphaelrrcoelho --password-stdin
    #   DATE=$(date -u +%Y-%m-%d)
    #   docker tag docker-verify:latest ghcr.io/raphaelrrcoelho/mathfin-verify:$DATE
    #   docker tag docker-verify:latest ghcr.io/raphaelrrcoelho/mathfin-verify:latest
    #   docker push ghcr.io/raphaelrrcoelho/mathfin-verify:$DATE
    #   docker push ghcr.io/raphaelrrcoelho/mathfin-verify:latest
    image: ghcr.io/raphaelrrcoelho/mathfin-verify:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.verify
    # Memory caps for the Lean side. lean-interact triggers `lake build` of
    # Mathlib + RemyDegenne/brownian-motion lazily on the first verify call.
    # Without caps, Lake reads `nproc` from cgroup and spawns that many parallel
    # `lean` workers (1-2 GB each), trivially blowing past an 8 GB host on a
    # multi-core machine.
    #
    # `cpuset` restricts the container to a fixed set of CPUs; this is what
    # Lake actually reads via `nproc`, so it's the only way to bound the worker
    # count (`cpus:` only caps CPU quota, not the worker count). Default is
    # CPUs 0-7 (8 workers, ~8-16 GB peak Lean memory). Drop back to `0-3` on
    # tight hosts: `VERIFY_CPUSET=0-3 docker compose ... run --rm verify ...`
    #
    # `LEAN_NUM_THREADS=1` is the cold-build sweet spot on this host:
    # Lake's own worker parallelism (~nproc concurrent module builds) already
    # saturates the 8 cores. Adding intra-elaboration threads on top causes
    # severe oversubscription (verified 2026-05-28: per-module elaboration
    # went from ~120s to ~290s when threads went 1→4). For per-request
    # serving (single Lean process in the REPL) intra-elaboration threads
    # would help, but our typical request elaborates ~100-LOC files, not
    # heavy enough to matter. Override only if you know what you're doing.
    cpuset: "${VERIFY_CPUSET:-0-7}"
    environment:
      - LEAN_NUM_THREADS=${LEAN_NUM_THREADS:-1}
    volumes:
      - ../tools:/app/tools:ro
      - ../benchmarks:/app/benchmarks:ro
      - ../tests:/app/tests:ro
      - ../mathfin.toml:/app/mathfin.toml:ro
      - lean_interact_cache:/usr/local/lib/python3.12/dist-packages/lean_interact/cache
      # SHARED olean cache with the `lean-repl` daemon (same named volume).
      # Without this, `verify` built oleans into its own ephemeral container
      # layer (lost on `--rm`), so a `verify` lake build did NOT help the
      # daemon — the daemon then re-built the same files from scratch on its
      # next boot (observed 2026-05-29: a 655s rebuild of a file `verify` had
      # just built). Sharing `lake_build_cache` means one `lake build` (via
      # either service) populates a single consistent olean store both reuse.
      # INVARIANT: never run `verify` and `lean-repl` concurrently — they share
      # this volume and Lake's build lock (one writer at a time).
      - lake_build_cache:/app/.lake
      # The repo root is the Lake project root (see
      # `tools.verify.config.LeanConfig.local_project`, default ".").
      # The lake-relevant pieces (lakefile.lean, lean-toolchain,
      # lake-manifest.json, MathFin/, MathFin.lean) are
      # bind-mounted RW so authoring on host (VS Code + Lean LSP) propagates
      # into the container with no rebuild.
      - ../MathFin:/app/MathFin
      - ../MathFin.lean:/app/MathFin.lean
      - ../lakefile.lean:/app/lakefile.lean
      - ../lake-manifest.json:/app/lake-manifest.json
      - ../lean-toolchain:/app/lean-toolchain
    working_dir: /app
    command: ["benchmarks/cross_validated.json", "-v", "--config", "mathfin.toml", "--timeout", "120"]
    # The same `verify` service can run the fast static lints inside docker by
    # overriding the entrypoint, so version drift (Python 3.12, pytest, etc.)
    # is impossible across machines:
    #   docker compose -f docker/docker-compose.yml run --rm \
    #       --entrypoint python3 verify -m pytest tests/test_router.py -q
    #   docker compose -f docker/docker-compose.yml run --rm \
    #       --entrypoint python3 verify -m tools.verify.coverage_report

  # Persistent Lean-interact REPL daemon. Pays the ~5-min Mathlib + BrownianMotion
  # + MathFin olean-load cost ONCE at startup, then handles each lake-check
  # request in 5-30 sec instead of 5-15 min. See `tools/verify/lean_repl.py` for
  # the protocol (TCP 7878, send raw .lean text, receive JSON response).
  #
  # Usage:
  #   docker compose -f docker/docker-compose.yml up -d lean-repl
  #   docker compose -f docker/docker-compose.yml logs -f lean-repl   # wait for READY
  #   ./scripts/lean-check.sh MathFin/<Section>/<Module>.lean    # fast iteration
  #   docker compose -f docker/docker-compose.yml down lean-repl       # tear down
  lean-repl:
    image: ghcr.io/raphaelrrcoelho/mathfin-verify:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.verify
    cpuset: "${VERIFY_CPUSET:-0-7}"
    environment:
      - LEAN_NUM_THREADS=${LEAN_NUM_THREADS:-1}
    volumes:
      - ../tools:/app/tools:ro
      - ../MathFin:/app/MathFin
      - ../MathFin.lean:/app/MathFin.lean
      - ../lakefile.lean:/app/lakefile.lean
      - ../lake-manifest.json:/app/lake-manifest.json
      - ../lean-toolchain:/app/lean-toolchain
      - ../mathfin.toml:/app/mathfin.toml:ro
      - lean_interact_cache:/usr/local/lib/python3.12/dist-packages/lean_interact/cache
      # Olean cache persistence: without this, every daemon restart re-runs
      # `lake build` from scratch on whatever's stale since the image was
      # built (~10–15 min). The named volume is populated from the image's
      # `/app/.lake/` on first creation (Docker semantics), then survives
      # `docker compose down lean-repl` so subsequent restarts skip the
      # rebuild entirely (seconds, not minutes).
      - lake_build_cache:/app/.lake
    working_dir: /app
    entrypoint: ["python3", "-m", "tools.verify.lean_repl"]
    ports:
      - "127.0.0.1:7878:7878"
    restart: "no"

volumes:
  lean_interact_cache:
  lake_build_cache:
