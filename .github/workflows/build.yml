name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Build and verify the whole library on the pinned toolchain (lean-toolchain).
# lean-action installs elan, fetches the Mathlib olean cache, and runs
# `lake build`; BrownianMotion + MathFin build from source.
#
# A green build is *also* the axiom-cleanliness proof: MathFin/AxiomAudit.lean
# #guard_msgs-pins every headline theorem to [propext, Classical.choice,
# Quot.sound] — and the GENERATED MathFin/AxiomAuditGen.lean extends the pin
# to every proof-position MathFin constant cited by the benchmark corpus —
# so `lake build` fails if any of them drifts.
#
# The kernel-replay layer (toolchain `leanchecker` over every content module)
# lives in kernel-replay.yml — nightly + workflow_dispatch, deliberately not
# per-push: it is 30-120 min of hosted-runner flake territory (see that
# file's header for the six-round 2026-06-06 diagnosis), while THIS workflow
# is the per-push soundness floor.

jobs:
  build:
    name: python gates + lake build + axiom audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail-fast values/honesty gates (stdlib + pytest, seconds): routing +
      # status declarations + module exposure (test_router), ledger rows
      # (test_ledger), forbidden text / definitional-rfl tripwire /
      # blueprint⊆audit / generated-audit freshness (test_values), and
      # verification-ledger freshness (`ledger status` exits 1 on any stale
      # entry). Before this step landed (2026-06-06) these gates ran only as
      # local session discipline — a push that skipped them came up green here.
      - name: Python gates (tests + ledger freshness)
        run: |
          pip install --quiet pytest
          python3 -m pytest tests/ -q
          python3 -m tools.verify.ledger status
          python3 -m tools.formalization_yaml --check

      - name: Build (elan + Mathlib cache + lake build)
        uses: leanprover/lean-action@v1
