name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Build and verify the whole library on the pinned toolchain (lean-toolchain).
# lean-action installs elan, fetches the Mathlib olean cache, and runs
# `lake build`; BrownianMotion + MathFin build from source.
#
# A green build is *also* the axiom-cleanliness proof: MathFin/AxiomAudit.lean
# #guard_msgs-pins every headline theorem to [propext, Classical.choice,
# Quot.sound], so `lake build` fails if any of them drifts.
#
# The kernel-replay layer (toolchain `leanchecker` over every content module)
# lives in kernel-replay.yml — nightly + workflow_dispatch, deliberately not
# per-push: it is 30-120 min of hosted-runner flake territory (see that
# file's header for the six-round 2026-06-06 diagnosis), while THIS workflow
# is the per-push soundness floor.

jobs:
  build:
    name: lake build + axiom audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (elan + Mathlib cache + lake build)
        uses: leanprover/lean-action@v1
