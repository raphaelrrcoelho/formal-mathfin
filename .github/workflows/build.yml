name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Build and verify the whole library on the pinned toolchain (lean-toolchain).
# lean-action installs elan, fetches the Mathlib olean cache, and runs
# `lake build`; BrownianMotion + MathFin build from source.
#
# A green build is *also* the axiom-cleanliness proof: MathFin/AxiomAudit.lean
# #guard_msgs-pins every headline theorem to [propext, Classical.choice,
# Quot.sound], so `lake build` fails if any of them drifts.
#
# The `kernel-replay` job is the honesty floor BELOW the elaborator: it
# replays every MathFin module's declarations through the Lean kernel via the
# toolchain-bundled `leanchecker` (elaborator bugs / env hacking cannot slip
# past it). It runs on the GitHub runner by doctrine — a full-environment
# batch load (~4-5 GB) that must never share the 10 GB local box with the
# lean-repl daemon (see CLAUDE.md "Memory doctrine").

jobs:
  build:
    name: lake build + axiom audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (elan + Mathlib cache + lake build)
        uses: leanprover/lean-action@v1

  kernel-replay:
    name: leanchecker kernel replay (MathFin)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Same cache key as the build job (manifest + commit) — restores the
      # built oleans, so `lake build` inside the action is an incremental
      # no-op and leanchecker only pays import loads.
      - name: Restore build (elan + caches)
        uses: leanprover/lean-action@v1

      - name: Replay every MathFin module through the kernel
        # CHUNKED, deliberately: one 180-module invocation OOM-evicted the
        # 16 GB runner twice (silent ~20 min, then agent shutdown + exit 143)
        # — leanchecker holds several module environments concurrently, and
        # the Foundations Itô tower's import closures are 4-5 GB each. A
        # fresh process per batch releases everything between batches while
        # keeping within-batch import amortization; per-batch echo keeps the
        # log alive for eviction-vs-progress diagnosis.
        run: |
          echo "== runner resources =="; free -h; df -h / /mnt 2>/dev/null || df -h /
          # background ticker: if the agent is evicted mid-batch, the last
          # tick in the log still tells us whether memory was climbing
          ( while true; do free -m | awk '/^Mem/{print strftime("%T"), "avail:", $7, "MB"}'; sleep 5; done ) &
          TICKER=$!
          find MathFin -name '*.lean' | sed 's|/|.|g; s|\.lean$||' > /tmp/modules.txt
          total=$(wc -l < /tmp/modules.txt)
          # The umbrella module is replayed ALONE first: three evictions all
          # died inside the batch containing it, while every local profile
          # (umbrella alone: 405s, 1.6GB under a 6g cap) stays modest.
          echo "::group::batch 0 (umbrella MathFin, isolated)"
          t0=$(date +%s)
          lake env leanchecker MathFin
          echo "umbrella ok in $(( $(date +%s) - t0 ))s"
          echo "::endgroup::"
          echo "checking $total modules in batches of 8"
          batch=0
          while mapfile -t -n 8 chunk && ((${#chunk[@]})); do
            batch=$((batch+1))
            echo "::group::batch $batch (${chunk[0]} …)"
            t0=$(date +%s)
            lake env leanchecker "${chunk[@]}"
            echo "batch $batch ok in $(( $(date +%s) - t0 ))s"
            echo "::endgroup::"
          done < /tmp/modules.txt
          kill "$TICKER" 2>/dev/null || true
