[hybrid-verify]

[hybrid-verify.lean]
version = "v4.30.0-rc1"
mathlib = true

# Vendored Lean libraries beyond Mathlib master. Each entry is appended to the
# `require` list passed to `lean-interact`'s TempRequireProject. Pin `rev` to a
# specific commit so toolchain bumps stay deterministic.
[[hybrid-verify.lean.extra_requires]]
name = "BrownianMotion"
git = "https://github.com/RemyDegenne/brownian-motion.git"
rev = "51807683c5130238fd4013b2fbee314135e3d8d9"

[hybrid-verify.isabelle]
# Default session for benchmarks that only need HOL-Probability. Individual
# theorems can override this via metadata.isabelle_session = "HybridVerifyAFP"
# (or any other registered session) when their code imports AFP entries such
# as Ergodic_Theory or Markov_Models. See docker/AFP_NOTES.md.
session = "HOL-Probability"
afp_session = "HybridVerifyAFP"
use_connector = false

[hybrid-verify.orchestrator]
max_workers = 3
default_timeout = 60.0
